<script type="text/html" data-template-name="ota-upgrade">
  <div class="form-row">
    <label for="node-input-config"><i class="fa fa-cog"></i> 配置</label>
    <input type="text" id="node-input-config" placeholder="选择配置">
  </div>
  <div class="form-row">
    <label for="node-input-currentVersion"><i class="fa fa-code-fork"></i> 当前版本</label>
    <input type="text" id="node-input-currentVersion" placeholder="0.1.5">
  </div>
  <div class="form-row">
    <label for="node-input-packageBaseUrl"><i class="fa fa-link"></i> 升级包 Base URL</label>
    <input type="text" id="node-input-packageBaseUrl" placeholder="https://dev.kunlun.cloud">
  </div>
  <div class="form-row">
    <label for="node-input-restartStrategy"><i class="fa fa-refresh"></i> 重启策略</label>
    <select id="node-input-restartStrategy">
      <option value="custom-command">自定义命令</option>
      <option value="process-exit">process.exit(0)</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-input-restartCommand"><i class="fa fa-terminal"></i> 重启命令</label>
    <input type="text" id="node-input-restartCommand" placeholder="service node-red restart">
  </div>
  <div class="form-row">
    <label for="node-input-restartDelayMs"><i class="fa fa-clock-o"></i> 重启延迟(ms)</label>
    <input type="number" id="node-input-restartDelayMs" placeholder="3000" min="0">
  </div>
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> 名称</label>
    <input type="text" id="node-input-name" placeholder="可选名称">
  </div>
</script>

<script type="text/javascript">
  RED.nodes.registerType('ota-upgrade', {
    category: 'IoT',
    color: '#F5A623',
    inputs: 0,
    outputs: 0,
    icon: 'bridge.svg',
    align: 'right',
    paletteLabel: 'WuLink-OTA升级',
    defaults: {
      name: { value: '' },
      config: {
        type: 'wulink-config',
        required: true
      },
      currentVersion: { value: '0.1.6', required: true },
      packageBaseUrl: { value: 'https://dev.kunlun.cloud', required: true },
      restartStrategy: { value: 'custom-command', required: true },
      restartCommand: { value: 'service node-red restart' },
      restartDelayMs: { value: 3000, required: true, validate: RED.validators.number() }
    },
    label: function () {
      return this.name || 'OTA升级';
    },
    oneditprepare: function () {
      const toggleRestartCommand = () => {
        const useCommand = $('#node-input-restartStrategy').val() === 'custom-command';
        $('#node-input-restartCommand').prop('disabled', !useCommand);
      };
      $('#node-input-restartStrategy').on('change', toggleRestartCommand);
      toggleRestartCommand();
    }
  });
</script>
